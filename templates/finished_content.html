<div id="page-theme" data-theme="{{if eq .Winner "villagers"}}light{{else}}dark{{end}}" data-winner="{{.Winner}}" hx-swap-oob="morph" hidden></div>

<div class="game-content" id="game-content" hx-swap-oob="morph" data-phase="finished">

    <!-- Hero: big centered win seal -->
    <section id="phase-main-section" class="win-hero">
        {{if eq .Winner "villagers"}}
        <picture>
            <source srcset="/static/seals/Villagers_win.avif" type="image/avif">
            <img class="win-seal-glow win-seal-villagers lqip" style="background-image:url({{sealLQIP "Villagers_win"}})" src="/static/seals/Villagers_win.webp" alt="{{T .Lang "villagers_win_alt"}}" onload="this.classList.add('seal-loaded')">
        </picture>
        {{else if eq .Winner "lovers"}}
        <picture>
            <source srcset="/static/seals/lovers_win.avif" type="image/avif">
            <img class="win-seal-glow win-seal-lovers lqip" style="background-image:url({{sealLQIP "lovers_win"}})" src="/static/seals/lovers_win.webp" alt="{{T .Lang "lovers_win_alt"}}" onload="this.classList.add('seal-loaded')">
        </picture>
        {{else}}
        <picture>
            <source srcset="/static/seals/Werewolves_win.avif" type="image/avif">
            <img class="win-seal-glow win-seal-werewolves lqip" style="background-image:url({{sealLQIP "Werewolves_win"}})" src="/static/seals/Werewolves_win.webp" alt="{{T .Lang "werewolves_win_alt"}}" onload="this.classList.add('seal-loaded')">
        </picture>
        {{end}}
    </section>

    <!-- Victors -->
    {{if .Winners}}
    <section id="victors-section">
        <h3 class="win-section-title">{{T .Lang "victors"}}</h3>
        <div class="card-list win-list">
            {{range .WinnerCards}}{{template "player-card" .}}{{end}}
        </div>
    </section>
    {{end}}

    <!-- The Fallen -->
    {{if .Losers}}
    <section id="losers-section">
        <h3 class="win-section-title win-section-title-fallen">{{T .Lang "the_fallen"}}</h3>
        <div class="card-list win-list">
            {{range .LoserCards}}{{template "player-card" .}}{{end}}
        </div>
    </section>
    {{end}}

    <section id="game-action-section">
        <form ws-send>
            <input type="hidden" id="action-new-game" name="action" value="new_game">
            <button type="submit" id="btn-new-game">{{T .Lang "btn_play_again"}}</button>
        </form>
    </section>
</div>
