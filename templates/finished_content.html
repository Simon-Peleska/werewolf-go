<div id="topbar-phase" hx-swap-oob="morph"><h1>Werewolf</h1></div>
<div id="page-theme" data-theme="{{if eq .Winner "villagers"}}light{{else}}dark{{end}}" hx-swap-oob="morph" hidden></div>

<div class="game-content" id="game-content" hx-swap-oob="morph" data-phase="finished">

    <!-- Hero: big centered win seal -->
    <section class="win-hero">
        {{if eq .Winner "villagers"}}
        <img class="seal seal-xl win-seal-glow win-seal-villagers" src="/static/seals/Villagers_win.webp" alt="Villagers win">
        {{else if eq .Winner "lovers"}}
        <img class="seal seal-xl win-seal-glow win-seal-lovers" src="/static/seals/lovers_win.webp" alt="Lovers win">
        {{else}}
        <img class="seal seal-xl win-seal-glow win-seal-werewolves" src="/static/seals/Werewolves_win.webp" alt="Werewolves win">
        {{end}}
    </section>

    <!-- Victors -->
    {{if .Winners}}
    <section>
        <h3 class="win-section-title">Victors</h3>
        <card-list class="win-list">
            {{range .Winners}}
            <player-card
                data-player-id="{{.ID}}"
                player-id="{{.PlayerID}}"
                role-name="{{.RoleName}}"
                role-desc="{{.RoleDescription}}"
                player-name="{{.Name}}"
                team="{{.Team}}"
                alive="{{if .IsAlive}}true{{else}}false{{end}}"
                profile-image="{{if .ProfileImageID}}/player-image/{{.ProfileImageID}}{{end}}"
                {{if ne .Lover 0}}lover{{end}}
                winner></player-card>
            {{end}}
        </card-list>
    </section>
    {{end}}

    <!-- The Fallen -->
    {{if .Losers}}
    <section>
        <h3 class="win-section-title win-section-title-fallen">The Fallen</h3>
        <card-list class="win-list">
            {{range .Losers}}
            <player-card
                data-player-id="{{.ID}}"
                player-id="{{.PlayerID}}"
                player-name="{{.Name}}"
                role-name="{{.RoleName}}"
                role-desc="{{.RoleDescription}}"
                team="{{.Team}}"
                alive="{{if .IsAlive}}true{{else}}false{{end}}"
                profile-image="{{if .ProfileImageID}}/player-image/{{.ProfileImageID}}{{end}}"
                {{if ne .Lover 0}}lover{{end}}
                loser
                ></player-card>
            {{end}}
        </card-list>
    </section>
    {{end}}

    <section id="game-action-section">
        <form ws-send>
            <input type="hidden" id="action-new-game" name="action" value="new_game">
            <button type="submit" id="btn-new-game">Play Again</button>
        </form>
    </section>
</div>
