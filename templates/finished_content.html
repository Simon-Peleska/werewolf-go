<div id="page-theme" data-theme="{{if eq .Winner "villagers"}}light{{else}}dark{{end}}" data-winner="{{.Winner}}" hx-swap-oob="morph" hidden></div>

<div class="game-content" id="game-content" hx-swap-oob="morph" data-phase="finished">

    <!-- Hero: big centered win seal -->
    <section id="phase-main-section" class="win-hero">
        {{if eq .Winner "villagers"}}
        <img class="win-seal-glow win-seal-villagers" src="/static/seals/Villagers_win.webp" alt="{{T .Lang "villagers_win_alt"}}">
        {{else if eq .Winner "lovers"}}
        <img class="win-seal-glow win-seal-lovers" src="/static/seals/lovers_win.webp" alt="{{T .Lang "lovers_win_alt"}}">
        {{else}}
        <img class="win-seal-glow win-seal-werewolves" src="/static/seals/Werewolves_win.webp" alt="{{T .Lang "werewolves_win_alt"}}">
        {{end}}
    </section>

    <!-- Victors -->
    {{if .Winners}}
    <section id="victors-section">
        <h3 class="win-section-title">{{T .Lang "victors"}}</h3>
        <card-list class="win-list">
            {{range .Winners}}
            <player-card
                data-player-id="{{.ID}}"
                player-id="{{.PlayerID}}"
                role-name="{{.RoleName}}"
                role-desc="{{.RoleDescription}}"
                player-name="{{.Name}}"
                team="{{.Team}}"
                alive="{{if .IsAlive}}true{{else}}false{{end}}"
                profile-image="{{if .ProfileImageID}}/player-image/{{.ProfileImageID}}{{end}}"
                {{if ne .Lover 0}}lover{{end}}
                {{if .IsDoppelganger}}doppelganger{{end}}
                winner></player-card>
            {{end}}
        </card-list>
    </section>
    {{end}}

    <!-- The Fallen -->
    {{if .Losers}}
    <section id="losers-section">
        <h3 class="win-section-title win-section-title-fallen">{{T .Lang "the_fallen"}}</h3>
        <card-list class="win-list">
            {{range .Losers}}
            <player-card
                data-player-id="{{.ID}}"
                player-id="{{.PlayerID}}"
                player-name="{{.Name}}"
                role-name="{{.RoleName}}"
                role-desc="{{.RoleDescription}}"
                team="{{.Team}}"
                alive="{{if .IsAlive}}true{{else}}false{{end}}"
                profile-image="{{if .ProfileImageID}}/player-image/{{.ProfileImageID}}{{end}}"
                {{if ne .Lover 0}}lover{{end}}
                {{if .IsDoppelganger}}doppelganger{{end}}
                loser
                ></player-card>
            {{end}}
        </card-list>
    </section>
    {{end}}

    <section id="game-action-section">
        <form ws-send>
            <input type="hidden" id="action-new-game" name="action" value="new_game">
            <button type="submit" id="btn-new-game">{{T .Lang "btn_play_again"}}</button>
        </form>
    </section>
</div>
