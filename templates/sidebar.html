<aside id="sidebar" class="sidebar" hx-swap-oob="morph">
  <div class="leftbound">
    <div>
      <label class="nav-toggle-button" for="sidebar-nav-toggle" role="button" aria-label="Toggle navigation">
        ☰
      </label>
    </div>
    <div>
      <h1>Werewolf</h1>
    </div>
  </div>

  {{if eq .Game.Status "night"}}
  <h2 class="sidebar-phase-label">Night {{.Game.Round}}</h2>
  {{else if eq .Game.Status "day"}}
  <h2 class="sidebar-phase-label sidebar-phase-day">Day {{.Game.Round}}</h2>
  {{end}}

  <section>
    <p><strong>{{.Player.Name}}</strong> <small>(Code: <code
          id="secret-code-display">{{.Player.SecretCode}}</code>)</small></p>
    <span id="player-id" hidden>{{.Player.ID}}</span>
  </section>

  <hr>

  <section>
    <h3>Players</h3>
    <card-list id="player-list">
      {{range .Players}}
      <player-card
        {{if eq .PlayerID $.Player.PlayerID}}id="sidebar-role-card"{{end}}
        data-player-id="{{.ID}}"
        player-id="{{.PlayerID}}"
        player-name="{{.Name}}"
        role-name="{{.RoleName}}"
        role-desc="{{.RoleDescription}}"
        team="{{.Team}}"
        alive="{{if .IsAlive}}true{{else}}false{{end}}"
        profile-image="{{if .ProfileImageID}}/player-image/{{.ProfileImageID}}{{end}}"
        {{if eq .PlayerID $.Player.PlayerID}}own-card{{end}}
        {{if eq .Lover $.Player.ID}}lover{{end}}
        {{if not (eq .PlayerID $.Player.PlayerID)}}collapsed{{end}}></player-card>
      {{end}}
    </card-list>
  </section>
</aside>
