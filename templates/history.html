<aside class="history-bar" id="history-bar" hx-swap-oob="morph" {{if not .Entries}}hidden{{end}}>
  <div class="rightbound">
    <div>
      <h1>{{T .Lang "hist_heading"}}</h1>
    </div>
    <label class="nav-toggle-button" for="history-bar-nav-toggle" role="button"
      aria-label="History Toggle navigation">
      H
    </label>
  </div>
  {{range .Entries}}
  <br>
  <section id="history-entry-{{.ID}}">
        {{.Description}}
  </section>
  {{end}}
</aside>
